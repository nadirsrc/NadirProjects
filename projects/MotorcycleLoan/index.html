<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motorcycle Loan Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .notice {
            text-align: center;
            padding: 3rem 2rem;
            max-width: 480px;
        }
        .notice h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .notice p {
            color: #888;
            line-height: 1.6;
        }
        .badge {
            display: inline-block;
            background: #777bb4;
            color: #fff;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="notice">
        <span class="badge">PHP Project</span>
        <h1>Motorcycle Loan Calculator</h1>
        <p>This project requires a PHP server to run. It cannot be hosted on GitHub Pages. Please run it locally with XAMPP/Laragon or deploy to a PHP-compatible hosting provider.</p>
    </div>
</body>
</html>
